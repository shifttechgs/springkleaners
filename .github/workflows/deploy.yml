name: Deploy to Hosting Pods

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies (production only)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies and build assets
        run: |
          npm ci
          npm run build

      # FTPS is used rather than SFTP because it works whether or not the
      # hosting plan includes SSH — cPanel enables FTP/FTPS by default.
      # If SSH access is confirmed later, switch this step to rsync-over-ssh
      # and drop the /deploy/migrate call below in favour of running
      # `php artisan migrate --force` directly over SSH instead.
      - name: Deploy over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.example
            **/storage/app/**
            **/storage/logs/**

      - name: Run migrations and clear caches
        run: |
          curl -sf -X POST "${{ secrets.DEPLOY_URL }}" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}"
